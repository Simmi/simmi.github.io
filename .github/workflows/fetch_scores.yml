name: Fetch Stuðkenni World Cup guess standings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and process standings
        run: python3 scripts/fetch_scores.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add studkenni/data/scores.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Stuðkenni World Cup guess standings"
            git push
          fi